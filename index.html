<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Ремонт техники различных брендов</title>
</head>

<body>
    <h2 class="headline">Ремонт техники различных брендов</h2>
    <div class="brands-grid" id="brandsGrid">

        <span class="brand-card">
           <img class="brand-logo lenovo" src="./images/Lenovo.png" alt="Lenovo">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card">
           <img class="brand-logo samsung" src="./images/Samsung.png" alt="Samsung">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card">
           <img class="brand-logo apple" src="./images/apple.png" alt="Apple">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card">
           <img class="brand-logo bosch" src="./images/Bosch.png" alt="Bosch">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card">
           <img class="brand-logo hp" src="./images/hp.png" alt="HP">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card">
           <img class="brand-logo acer" src="./images/acer.png" alt="acer">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card hidden">
           <img class="brand-logo viewSonic" src="./images/viewsonic.png" alt="viewSonic">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card hidden">
           <img class="brand-logo sony" src="./images/sony.png" alt="sony">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card hidden">
           <img class="brand-logo samsung" src="./images/Samsung.png" alt="Samsung">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card hidden">
           <img class="brand-logo apple" src="./images/apple.png" alt="Apple">
           <img class="arrow-button" src="./images/go.png">
        </span>

        <span class="brand-card hidden">
           <img class="brand-logo bosch" src="./images/Bosch.png" alt="Bosch">
           <img class="arrow-button" src="./images/go.png">
        </span>
        
        <button class="hidden-icon" id="hidden-content">
            <img class="" scr="./images/down.png"> Показать все
        </button>

    </div>
    <script src="script.js"></script>

    
</body>
</html>
